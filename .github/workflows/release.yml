name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build app bundle
        run: make app

      - name: Create zip
        run: zip -r Kiromon.app.zip Kiromon.app

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: Kiromon.app.zip
          generate_release_notes: true
